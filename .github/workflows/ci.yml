name: CI

on:
  push:
    paths:
      - 'scripts/**'
      - '.chezmoi.toml.tmpl'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'scripts/**'
      - '.chezmoi.toml.tmpl'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shell: [bash, zsh, fish]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh fish age curl
          mkdir -p $HOME/.local/bin
          # Install chezmoi
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b $HOME/.local/bin
          # Install sops
          SOPS_VERSION=3.8.1
          curl -LO https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64
          mv sops-v${SOPS_VERSION}.linux.amd64 $HOME/.local/bin/sops
          chmod +x $HOME/.local/bin/sops
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Smoke test selected shell
        shell: ${{ matrix.shell }}
        run: |
          echo "Running matrix shell: ${{ matrix.shell }}"
          command -v ${{ matrix.shell }}

      - name: Setup environment and age key
        shell: bash
        run: |
          mkdir -p "$HOME/.config/chezmoi"
          # Generate a new age key for CI
          age-keygen -o "$HOME/.config/chezmoi/key.txt"
          # Extract public key and save to GITHUB_ENV
          PUBKEY=$(grep "public key:" "$HOME/.config/chezmoi/key.txt" | cut -d: -f2 | xargs)
          echo "CI_PUBKEY=$PUBKEY" >> "$GITHUB_ENV"

      - name: Initialize chezmoi
        shell: bash
        run: |
          set -euo pipefail
          # Generate config for this checkout
          chezmoi init --source .
          # Point chezmoi's default source path at the checked out repository so hooks resolve correctly
          mkdir -p "$HOME/.local/share"
          rm -rf "$HOME/.local/share/chezmoi"
          ln -s "$PWD" "$HOME/.local/share/chezmoi"
          # Ensure the generated config uses the CI age key and recipient
          sed -i "s/recipient = \".*\"/recipient = \"$CI_PUBKEY\"/" "$HOME/.config/chezmoi/chezmoi.toml"
          # Verify sops can use the key (sanity check)
          export SOPS_AGE_KEY_FILE="$HOME/.config/chezmoi/key.txt"
          echo "test: value" > test_sops.yaml
          sops --encrypt --age "$CI_PUBKEY" test_sops.yaml > test_sops.enc.yaml
          sops --decrypt test_sops.enc.yaml | grep -q "test: value"
          test "$(chezmoi source-path)" = "$HOME/.local/share/chezmoi"

      - name: Run tests from selected shell
        shell: ${{ matrix.shell }}
        run: |
          # Ensure scripts are executable
          chmod +x ./scripts/*.sh
          # Run from the destination directory; the scripts look up the source via `chezmoi source-path`
          cd "$HOME"
          sh "$GITHUB_WORKSPACE/scripts/test_check-secrets.sh"
          sh "$GITHUB_WORKSPACE/scripts/test_apply-secrets.sh"
