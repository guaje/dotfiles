# --- OpenStack cloud indicator, keyed on OS_CLIENT_CONFIG_FILE ---
# The built-in $openstack module is unused: it reads OS_CLOUD, which is "openstack"
# for every clouds.yaml here, so it can't tell clouds apart. These custom modules
# key off OS_CLIENT_CONFIG_FILE instead. All four are referenced by a single $custom
# token in `format`; their `when` conditions are mutually exclusive, so exactly one
# renders at a time:
#   green  = read-only app cred    (filename contains ReadOnly)
#   red    = unrestricted app cred (filename contains Unrestricted)
#   peach  = file without a recognised access tag, or plain OS_CLOUD fallback
[custom.oscloud_ro]
description = "OpenStack read-only application credential (green)"
command = "f=$(basename \"$OS_CLIENT_CONFIG_FILE\"); echo \"${f%.*}\""
when = '''[ -n "$OS_CLIENT_CONFIG_FILE" ] && printf '%s' "$OS_CLIENT_CONFIG_FILE" | grep -q 'ReadOnly' '''
format = "on [¾░ùÜ $output]($style) "
style = "bold green"

[custom.oscloud_rw]
description = "OpenStack unrestricted application credential (red)"
command = "f=$(basename \"$OS_CLIENT_CONFIG_FILE\"); echo \"${f%.*}\""
when = '''[ -n "$OS_CLIENT_CONFIG_FILE" ] && printf '%s' "$OS_CLIENT_CONFIG_FILE" | grep -q 'Unrestricted' '''
format = "on [¾░ùÜ $output]($style) "
style = "bold red"

[custom.oscloud_other]
description = "OpenStack cloud file without a recognised access tag (peach)"
command = "f=$(basename \"$OS_CLIENT_CONFIG_FILE\"); echo \"${f%.*}\""
when = '''[ -n "$OS_CLIENT_CONFIG_FILE" ] && ! printf '%s' "$OS_CLIENT_CONFIG_FILE" | grep -qE 'ReadOnly|Unrestricted' '''
format = "on [¾░ùÜ $output]($style) "
style = "bold peach"

[custom.oscloud_env]
description = "Fallback: OS_CLOUD set without OS_CLIENT_CONFIG_FILE (peach)"
command = "printf '%s' \"$OS_CLOUD\""
when = '''[ -z "$OS_CLIENT_CONFIG_FILE" ] && [ -n "$OS_CLOUD" ]'''
format = "on [¾░ùÜ $output]($style) "
style = "bold peach"

