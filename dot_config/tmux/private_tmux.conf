# Better splitting
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Toggle synchronize-panes
bind e setw synchronize-panes

# Source .tmux.conf
bind R source-file ~/.config/tmux/tmux.conf

# Start indexing windows at 1 instead of 0
set -g base-index 1

# Enable mouse
set -g mouse on

# Enable extended key reporting
set -g extended-keys on

# Switch tmux extended-keys-format from xterm to csi-i, as Pi works best with csi-u
set -g extended-keys-format csi-u

# Renumber all windows when any window is closed
set -g renumber-windows on

# Vi mode
setw -g mode-keys vi

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'erikw/tmux-powerline'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'omerxx/tmux-sessionx'

# Restore last saved environment (Continuum)
set -g @continuum-restore 'on'

set -g @sessionx-bind 's'

# Catppuccin theme config
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(Z),}"
set -g @catppuccin_window_status_style "rounded"

# Make the status line pretty
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
